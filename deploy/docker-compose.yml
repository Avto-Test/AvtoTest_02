services:
  db:
    image: postgres:16-alpine
    container_name: autotest-db-prod
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - autotest-network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prod
    container_name: autotest-backend-prod
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
      ALLOW_PROD_MIGRATIONS: "1"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - autotest-network
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: autotest-frontend-prod
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => {if(res.statusCode !== 200) throw new Error(res.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
    networks:
      - autotest-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: autotest-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - autotest-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  autotest-network:
    driver: bridge
