version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: autotest-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autotest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autotest-network

  # FastAPI Backend (Local Development)
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.local
    container_name: autotest-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/autotest
      APP_ENV_FILE: .env.local
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - /app/__pycache__
      - /app/.venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - autotest-network

volumes:
  postgres_data:

networks:
  autotest-network:
    driver: bridge